# AI Lifeguard runtime configuration (key = value).
# Lines beginning with '#' are ignored.

# --- Video input ------------------------------------------------------
# Path to the recorded footage (e.g. an MP4 file) the pipeline analyzes.
video_file     = samples/pool.mp4
frame_width    = 1280
frame_height   = 720
target_fps     = 15

# --- Models -----------------------------------------------------------
detector_model = models/swimmer_detector_int8.tflite
# Pose model is OPTIONAL: if the file is missing the app still runs detection +
# motion-based distress features (it just skips pose-based features).
pose_model     = models/movenet_lightning_int8.tflite
num_threads    = 4
detector_score_threshold = 0.5
# Detector class index treated as a person/swimmer (COCO SSD-MobileNet = 0).
person_class_id = 0

# --- Distress logic ---------------------------------------------------
# Seconds the distress condition must persist before an alert fires.
distress_persist_seconds = 4.0
# Sliding window (seconds) for motion-based features.
temporal_window_seconds  = 6.0

# --- Alerting ---------------------------------------------------------
alert_log      = true
log_path       = lifeguard.log
