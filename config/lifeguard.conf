# AI Lifeguard runtime configuration (key = value).
# Lines beginning with '#' are ignored.

# --- Camera -----------------------------------------------------------
# backend: uvc (USB webcam, recommended for v1) | csi (Camera Module 3) | file
# On QNX, uvc/csi both use the Sensor Framework (QSF) capture path.
camera_backend = uvc
# On the QNX target this is informational (QSF selects the sensor). For host
# OpenCV testing it may be a numeric webcam index (e.g. 0) or a file path.
# camera_device  = /dev/video0
camera_device  = 0

# QSF camera unit index (maps to CAMERA_UNIT_*); used on the QNX target:
camera_unit    = 1
# Used only when camera_backend = file (recorded footage for testing):
video_file     =
frame_width    = 1280
frame_height   = 720
target_fps     = 15

# --- Models -----------------------------------------------------------
detector_model = models/swimmer_detector_int8.tflite
pose_model     = models/movenet_lightning_int8.tflite
num_threads    = 4
detector_score_threshold = 0.5

# --- Distress logic ---------------------------------------------------
# Seconds the distress condition must persist before an alert fires.
distress_persist_seconds = 4.0
# Sliding window (seconds) for motion-based features.
temporal_window_seconds  = 6.0

# --- Alerting ---------------------------------------------------------
alert_gpio     = false
alert_gpio_pin = 17
alert_log      = true
log_path       = /data/lifeguard/lifeguard.log
