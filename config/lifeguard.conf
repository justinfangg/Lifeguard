# Live end-to-end setup: Pi Camera Module 3 -> MJPEG -> Mac TensorFlow Lite.
# Start camera_test on the Pi and use an SSH tunnel as documented in BUILD.md.

video_file     =
camera_backend = network
camera_device  = http://127.0.0.1:8090/video.mjpg
frame_width    = 1280
frame_height   = 720
target_fps     = 15
display        = true
output_video   = videos/lifeguard_live_annotated.mp4

# Annotated browser output from the Mac.
stream_enabled = true
stream_port    = 8080
stream_width   = 960
stream_jpeg_quality = 82

detector_model = models/swimmer_detector_int8.tflite
pose_model     = models/movenet_lightning_int8.tflite
num_threads    = 4
detector_score_threshold = 0.35
person_class_id = 0

# Show potential danger quickly and hold the red overlay long enough to see.
distress_persist_seconds = 1.0
temporal_window_seconds  = 6.0
distress_score_threshold = 0.40
potential_distress_score_threshold = 0.40
potential_enter_seconds = 1.0
potential_clear_seconds = 30.0
alert_clear_seconds = 30.0

alert_log = true
log_path  = lifeguard.log
