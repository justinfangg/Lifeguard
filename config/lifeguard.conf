# AI Lifeguard runtime configuration (key = value).
# Lines beginning with '#' are ignored.

# --- Video input ------------------------------------------------------
# Live webcam / capture-device mode. Use this for the simplest no-SDK setup.
video_file     =
camera_backend = uvc
camera_device  = 0
frame_width    = 1280
frame_height   = 720
target_fps     = 15
display        = true
output_video   =
stream_enabled = true
stream_port    = 8080
stream_width   = 960
stream_jpeg_quality = 80

# --- Models -----------------------------------------------------------
detector_model = models/swimmer_detector_int8.tflite
# MoveNet pose is required for the live distress analysis pipeline.
pose_model     = models/movenet_lightning_int8.tflite
num_threads    = 4
detector_score_threshold = 0.5
# Detector class index treated as a person/swimmer for this export.
person_class_id = 0

# --- Distress logic ---------------------------------------------------
# Seconds the distress condition must persist before an alert fires.
distress_persist_seconds = 4.0
# Sliding window (seconds) for motion-based features.
temporal_window_seconds  = 6.0
distress_score_threshold = 0.6
potential_distress_score_threshold = 0.2

# --- Alerting ---------------------------------------------------------
alert_log      = true
log_path       = lifeguard.log
