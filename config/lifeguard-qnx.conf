# AI Lifeguard runtime configuration for the verified QNX Pi 5 target.
# Raspberry Pi Camera Module 3 / IMX708 is registered as SENSOR_UNIT_1 and
# supplies NV12 frames through the QNX Sensor Framework.

# --- Camera -----------------------------------------------------------
camera_backend = csi
camera_unit    = 1
frame_width    = 1280
frame_height   = 720
target_fps     = 15

# --- Models -----------------------------------------------------------
# Copy the model files to these paths before starting ai_lifeguard.
detector_model = /data/home/qnxuser/lifeguard/models/swimmer_detector_int8.tflite
pose_model     = /data/home/qnxuser/lifeguard/models/movenet_lightning_int8.tflite
num_threads    = 4
detector_score_threshold = 0.5

# --- Distress logic ---------------------------------------------------
distress_persist_seconds = 4.0
temporal_window_seconds  = 6.0

# --- Alerting ---------------------------------------------------------
alert_gpio     = false
alert_gpio_pin = 17
alert_log      = true
log_path       = /data/home/qnxuser/lifeguard/lifeguard.log
