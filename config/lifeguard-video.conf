# Local regression input: same AI/overlay path as live mode, from an MP4.
video_file     = videos/videoplayback.mp4
camera_backend = file
camera_device  =
frame_width    = 1280
frame_height   = 720
target_fps     = 15
display        = false
output_video   = videos/lifeguard_annotated.mp4
stream_enabled = false

detector_model = models/swimmer_detector_int8.tflite
pose_model     = models/movenet_lightning_int8.tflite
num_threads    = 4
detector_score_threshold = 0.35
person_class_id = 0
distress_persist_seconds = 3.0
temporal_window_seconds = 6.0
distress_score_threshold = 0.55
potential_distress_score_threshold = 0.18
potential_hold_seconds = 2.5
alert_log = true
log_path = lifeguard.log
